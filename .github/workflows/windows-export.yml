name: "Export Windows Build"
on: [push]
permissions:
  contents: write

jobs:
  export-windows:
    name: Windows Export
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Godot Files
        id: cache-godot
        uses: actions/cache@v4
        with:
          # Paths to the engine and the template folder
          path: |
            ./godot.exe
            ~/AppData/Roaming/Godot/export_templates/4.6.1.stable
          # Unique key based on the version; if 4.6.1 changes, the cache resets
          key: ${{ runner.os }}-godot-4.6.1-stable

      - name: Download Godot 4.6.1 & Templates
        # Only run this if the cache was NOT found
        if: steps.cache-godot.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          # Download Godot Engine 4.6.1 Stable for Windows
          # 1. Download the Engine
          $godot_url = "https://github.com/godotengine/godot/releases/download/4.6.1-stable/Godot_v4.6.1-stable_win64.exe.zip"
          Invoke-WebRequest -Uri $godot_url -OutFile godot.zip

          # 2. Extract
          Expand-Archive godot.zip -DestinationPath .

          # 3. Rename ONLY the main executable (ignoring the _console.exe)
          # We filter for files that DON'T contain "console"
          Get-ChildItem -Path . -Filter "Godot*.exe" | Where-Object { $_.Name -notlike "*console*" } | Rename-Item -NewName "godot.exe"

          # Download and Install 4.6.1 Export Templates
          Invoke-WebRequest -Uri "https://downloads.godotengine.org/?version=4.6.1&flavor=stable&slug=export_templates.tpz&platform=templates" -OutFile templates.zip
          Expand-Archive templates.zip -DestinationPath .
          $appdata = [System.Environment]::GetFolderPath('ApplicationData')
          $template_path = "$appdata\Godot\export_templates\4.6.1.stable"
          New-Item -ItemType Directory -Force -Path $template_path
          Move-Item -Path "templates/*" -Destination $template_path -Force

      - name: Export Project
        run: |
          # Create the directory structure properly for Windows
          mkdir build -ErrorAction SilentlyContinue
          mkdir build/windows -ErrorAction SilentlyContinue
          # Ensure "Windows Desktop" matches your preset name in Godot exactly
          .\godot.exe --headless --display-driver headless --verbose --path . --export-release "Windows Desktop" build/windows/monster-lab.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/

      - name: Rename File with Version
        shell: powershell
        run: |
          # Matches the export path you set in Godot
          Rename-Item -Path "build/windows/monster-lab.exe" -NewName "monster-lab-v0.${{ github.run_number }}.exe"

      - name: Create Automated Release
        uses: softprops/action-gh-release@v2
        with:
          # This creates tags like 'build-1', 'build-2', etc.
          tag_name: "build-${{ github.run_number }}"
          name: "MonsterLab v0.${{ github.run_number }}"
          body: "Automated build from commit ${{ github.sha }}"
          files: build/windows/monster-lab-v0.${{ github.run_number }}.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}